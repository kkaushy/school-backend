services:
  - type: web
    name: school-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "python manage.py migrate && gunicorn school_backend.wsgi --bind 0.0.0.0:$PORT --log-file -"
    healthCheckPath: /api/schema/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_SSLMODE
        value: "require"
      - key: JWT_SECRET
        generateValue: true
